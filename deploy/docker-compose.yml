version: '3.8'

services:

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:

      - ./nginx.conf:/etc/nginx/nginx.conf

      - ../static:/usr/share/nginx/html
    depends_on:
      - redis
      - mysql


  redis:
    image: redis:6.2
    ports:
      - "6379:6379"


  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seckill
    ports:
      - "3306:3306"