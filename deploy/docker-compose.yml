services:
  mysql-master:
    image: mysql:8.0
    container_name: seckill-mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seckill
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ../src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../src/main/resources/data.sql:/docker-entrypoint-initdb.d/02-data.sql

  mysql-slave:
    image: mysql:8.0
    container_name: seckill-mysql-slave
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seckill
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_slave_data:/var/lib/mysql
      - ../src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../src/main/resources/data.sql:/docker-entrypoint-initdb.d/02-data.sql

  redis:
    image: redis:7.2
    container_name: seckill-redis
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.7
    container_name: seckill-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  app1:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: seckill-app1
    environment:
      MYSQL_MASTER_HOST: mysql-master
      MYSQL_MASTER_PORT: 3306
      MYSQL_MASTER_DATABASE: seckill
      MYSQL_MASTER_USER: root
      MYSQL_MASTER_PASSWORD: root
      MYSQL_SLAVE_HOST: mysql-slave
      MYSQL_SLAVE_PORT: 3306
      MYSQL_SLAVE_DATABASE: seckill
      MYSQL_SLAVE_USER: root
      MYSQL_SLAVE_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_INSTANCE: app1
      SERVER_PORT: 8080
    depends_on:
      - mysql-master
      - mysql-slave
      - redis
      - kafka

  app2:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: seckill-app2
    environment:
      MYSQL_MASTER_HOST: mysql-master
      MYSQL_MASTER_PORT: 3306
      MYSQL_MASTER_DATABASE: seckill
      MYSQL_MASTER_USER: root
      MYSQL_MASTER_PASSWORD: root
      MYSQL_SLAVE_HOST: mysql-slave
      MYSQL_SLAVE_PORT: 3306
      MYSQL_SLAVE_DATABASE: seckill
      MYSQL_SLAVE_USER: root
      MYSQL_SLAVE_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_INSTANCE: app2
      SERVER_PORT: 8080
    depends_on:
      - mysql-master
      - mysql-slave
      - redis
      - kafka

  nginx:
    image: nginx:latest
    container_name: seckill-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../static:/usr/share/nginx/html:ro
    depends_on:
      - app1
      - app2

volumes:
  mysql_master_data:
  mysql_slave_data:
